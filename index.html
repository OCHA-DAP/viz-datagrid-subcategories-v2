<!DOCTYPE html>
<html>
  <head>
    <meta charset='utf-8' />
    <title>Data Grid Completeness</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <link rel='icon' type='image/png' href='https://data.humdata.org/images/icons/hdx.ico' />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href='css/styles.css' rel='stylesheet' />
  </head>

  <body>

    <div class="loader">
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <main>
      <div class='grid-container'>
        <div class='col-10'>
          <div class='header'>
            <div class='header-left'>
              <h2>Availability by location and sub-category</h2>
              <p class='subtitle'>Short description on one or two rows that explains the visualization.</p>
            </div>
            <div class='header-right'>
              <div class='legend small'>
                <div class='chip chip-complete'></div> Available and Up-to-date <div class='chip chip-incomplete'></div> Available and Not Up-to-date <div class='chip chip-nodata'></div> Unavailable <div class='chip chip-na'></div> NA
              </div>
              <div class="form-select control-group control-order-by">
                <label for="field-order-by">Sort by</label>
                <div class="dropdown orderDropdown" data-module-additional="#organizationsSection">
                  <button id="field-order-by" class="dropdown-toggle" data-toggle="dropdown">
                    <span class="dropdown-toggle-text">Category</span>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <ul class="dropdown-menu dropdown-inverse" role="menu">
                    <li><a tabindex="-1" val="category">Category</a></li>
                    <li><a tabindex="-1" val="dsc">Available % (dsc)</a></li>
                    <li><a tabindex="-1" val="asc">Available % (asc)</a></li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
          <div class='table-container'></div>
        </div>
      </div>
    </main>

    <script src='https://d3js.org/d3.v7.js'></script>
    <script type="module" src='js/viz.js'></script>
  </body>
</html>
